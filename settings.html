<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin Dashboard</title>
    <link rel="icon" href="/images/tap-icon.png">
    
    <!-- Global Theme Styles -->
    <link rel="stylesheet" href="/styles/theme.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
        }

        .settings-container {
            width: 100%;
            max-width: var(--container-max-width);
            display: flex;
            flex-direction: row;
            min-height: 700px;
            margin: 0 auto 80px auto; /* Removed top margin, will align with title */
            background: transparent; /* Removed card look */
            border: none;
            box-shadow: none;
            overflow: visible;
        }

        /* Modern Sidebar */
        .sidebar {
            width: 120px;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .sidebar-item {
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .sidebar-item svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
        }

        .sidebar-item:hover, .sidebar-item.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-item.active {
            border-left: 4px solid var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Content Area */
        .content-area {
            flex: 1;
            padding: 0 0 0 40px;
            overflow-y: visible;
            max-width: calc(var(--container-max-width) - 120px);
            margin: 0;
        }

        .main-title-section {
            width: 100%;
            max-width: var(--container-max-width);
            margin: var(--page-top-margin) auto 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .main-title {
            font-family: var(--font-heading);
            font-size: 45px;
            margin: 0;
            color: var(--text-color);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .section-header h1 {
            font-family: var(--font-heading);
            font-size: 28px;
            margin: 0;
        }

        /* IDE-like Editor */
        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        /* EasyMDE Dark Theme Overrides */
        .EasyMDEContainer .CodeMirror {
            background: #1e1e1e !important;
            color: #d4d4d4 !important;
            border-color: #333 !important;
            font-family: 'Consolas', monospace !important;
        }
        .EasyMDEContainer .editor-toolbar {
            background: #2d2d2d !important;
            border-color: #333 !important;
        }
        .EasyMDEContainer .editor-toolbar button {
            color: #aaa !important;
        }
        .EasyMDEContainer .editor-toolbar button:hover {
            background: #3d3d3d !important;
            color: white !important;
        }
        .EasyMDEContainer .editor-toolbar button.active {
            background: #3d3d3d !important;
        }
        .CodeMirror-cursor { border-left: 2px solid white !important; }
        
        /* Syntax Highlighting colors */
        .cm-header { color: var(--primary-color) !important; font-weight: bold; }
        .cm-strong { color: var(--secondary-color) !important; }
        .cm-link { color: #4da3ff !important; }
        .cm-code { color: #ce9178 !important; }

        /* Modern JSON List */
        .item-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
            gap: 15px;
        }

        .list-item {
            background: var(--background-color);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .list-item:hover {
            border-color: var(--primary-color);
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .list-item h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
            font-weight: 600;
        }

        .list-item p {
            margin: 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Professional Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border-color: var(--border-color);
            color: var(--text-color);
        }

        .btn-outline:hover {
            background: var(--inline-code-bg);
        }

        .btn-danger {
            color: #ff4d4d;
            border-color: rgba(255, 77, 77, 0.2);
        }

        .btn-danger:hover {
            background: rgba(255, 77, 77, 0.1);
        }

        /* Modal / Dialog */
        .dialog-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .dialog {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--background-color);
            color: var(--text-color);
            font-family: var(--font-main);
            box-sizing: border-box;
        }

        /* Status Banner */
        .status-banner {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: var(--radius-md);
            background: var(--primary-color);
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            z-index: 3000;
            font-weight: 600;
            animation: slideInUp 0.4s ease;
        }

        @keyframes slideInUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 900px) {
            .settings-container { flex-direction: column; }
            .sidebar { width: 100%; flex-direction: row; justify-content: center; padding: 0; }
            .sidebar-item { padding: 15px; flex: 1; }
        }
    </style>
</head>
<body>
    <my-header></my-header>
    <script type="module" src="/styles/header.js"></script>
    <script src="/menu.js"></script>

    <main>
        <div class="main-title-section">
            <h1 class="main-title">Settings</h1>
        </div>
        <div class="settings-container">
            <div class="sidebar">
                <div class="sidebar-item" data-section="about">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    About
                </div>
                <div class="sidebar-item" data-section="publications">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    Pubs
                </div>
                <div class="sidebar-item" data-section="projects">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    Projects
                </div>
                <div class="sidebar-item" data-section="blog">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Blog
                </div>
                <div class="sidebar-item" data-section="events">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Events
                </div>
                
                <div class="sidebar-item" style="margin-top: auto;" onclick="logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </div>
            </div>

            <div class="content-area">
                <div id="section-content">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </main>

    <my-footer></my-footer>
    <script type="module" src="/styles/footer.js"></script>

    <!-- Dialog -->
    <div id="dialog-overlay" class="dialog-overlay">
        <div class="dialog">
            <h2 id="dialog-title" style="margin-top:0; font-family:var(--font-heading);">Edit Item</h2>
            <div id="dialog-form"></div>
            <div class="section-header" style="margin-top:30px; border:none; padding:0; margin-bottom:0;">
                <button class="btn btn-outline" onclick="closeDialog()">Cancel</button>
                <button class="btn btn-primary" onclick="saveItem()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="status-banner" class="status-banner">Changes saved successfully!</div>

    <script>
        if (sessionStorage.getItem('isAdmin') !== 'true') window.location.href = '/login.html';
        function logout() { sessionStorage.removeItem('isAdmin'); window.location.href = '/'; }

        let currentSection = '';
        let sectionData = [];
        let editingIndex = -1;
        let markdownEditor = null;

        const configs = {
            about: { title: 'Settings: About Me', type: 'markdown', file: '/about/about.md' },
            publications: { title: 'Settings: Publications', type: 'json', file: '/data/publications.json', fields: ['badge', 'title', 'description', 'link', 'image', 'date', 'pinned'] },
            projects: { title: 'Settings: Projects', type: 'json', file: '/data/projects.json', fields: ['badge', 'title', 'description', 'link', 'image', 'date'] },
            blog: { title: 'Settings: Blog', type: 'blog', file: '/data/blogs.json', fields: ['badge', 'title', 'description', 'image', 'link', 'date', 'pinned'] },
            events: { title: 'Settings: Events', type: 'json', file: '/data/events.json', fields: ['badge', 'title', 'description', 'image', 'date', 'pinned'] }
        };

        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', () => {
                const section = item.getAttribute('data-section');
                if (section) loadSection(section);
            });
        });

        async function loadSection(section) {
            currentSection = section;
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            const activeItem = document.querySelector(`[data-section="${section}"]`);
            if (activeItem) activeItem.classList.add('active');

            const config = configs[section];
            const content = document.getElementById('section-content');
            content.innerHTML = `<div class="section-header"><h1>${config.title}</h1></div><p>Loading...</p>`;

            try {
                const response = await fetch(config.file + '?t=' + Date.now());
                if (config.type === 'markdown') {
                    const text = await response.text();
                    renderMarkdownEditor(text);
                } else {
                    sectionData = await response.json();
                    renderJSONList();
                }
            } catch (err) {
                content.innerHTML = `<h1>Error</h1><p>Could not load ${config.file}</p>`;
            }
        }

        function renderMarkdownEditor(content) {
            const container = document.getElementById('section-content');
            container.innerHTML = `
                <div class="section-header">
                    <h1>About Me</h1>
                    <button class="btn btn-primary" onclick="saveMarkdown()">Save Changes</button>
                </div>
                <div class="editor-wrapper">
                    <textarea id="markdown-editor">${content}</textarea>
                </div>
            `;
            
            if (markdownEditor) markdownEditor.toTextArea();
            markdownEditor = new EasyMDE({
                element: document.getElementById('markdown-editor'),
                spellChecker: false,
                autosave: { enabled: false },
                status: false,
                placeholder: "Start writing your professional profile...",
                minHeight: "500px",
                theme: "dark" // EasyMDE doesn't have a native dark theme but we'll style it via CSS
            });
        }

        function renderJSONList() {
            const container = document.getElementById('section-content');
            const config = configs[currentSection];
            let html = `
                <div class="section-header">
                    <h1>${config.title}</h1>
                    <button class="btn btn-primary" onclick="openDialog(-1)">+ Add New</button>
                </div>
                <div class="item-list">
            `;

            sectionData.forEach((item, index) => {
                html += `
                    <div class="list-item">
                        <div class="list-item-info">
                            <h3>${item.title}</h3>
                            <p>${item.date || ''} ${item.pinned ? '• Pinned' : ''}</p>
                        </div>
                        <div style="display:flex; gap:10px;">
                            ${currentSection === 'blog' ? `<button class="btn btn-outline" style="font-size:11px; padding:6px 12px;" onclick="editBlogPostContent(${index})">Edit Post</button>` : ''}
                            <button class="btn btn-outline" style="font-size:11px; padding:6px 12px;" onclick="openDialog(${index})">Details</button>
                            <button class="btn btn-outline btn-danger" style="font-size:11px; padding:6px 12px;" onclick="deleteItem(${index})">Delete</button>
                        </div>
                    </div>
                `;
            });

            html += `</div><div class="section-header" style="margin-top:40px; border:none; justify-content:flex-end;">
                <button class="btn btn-primary" onclick="saveJSON()">Save All Changes</button>
            </div>`;
            container.innerHTML = html;
        }

        async function editBlogPostContent(index) {
            const post = sectionData[index];
            const id = post.link.split('=')[1];
            const fileName = id + '.md';
            const filePath = '/blog/posts/' + fileName;

            const content = document.getElementById('section-content');
            content.innerHTML = `
                <div class="section-header">
                    <h1>Edit: ${post.title}</h1>
                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-outline" onclick="renderJSONList()">Back</button>
                        <button class="btn btn-primary" onclick="saveBlogMarkdown('${fileName}')">Save Post</button>
                    </div>
                </div>
                <div class="editor-wrapper">
                    <textarea id="blog-markdown-editor">Loading...</textarea>
                </div>
            `;

            try {
                const response = await fetch(filePath + '?t=' + Date.now());
                const text = response.ok ? await response.text() : '# ' + post.title + '\n\nStart here...';
                
                if (markdownEditor) markdownEditor.toTextArea();
                markdownEditor = new EasyMDE({
                    element: document.getElementById('blog-markdown-editor'),
                    spellChecker: false,
                    status: false,
                    minHeight: "500px"
                });
                markdownEditor.value(text);
            } catch (err) {
                console.error(err);
            }
        }

        function openDialog(index) {
            editingIndex = index;
            const config = configs[currentSection];
            const item = index === -1 ? {} : sectionData[index];
            document.getElementById('dialog-title').innerText = index === -1 ? 'Add New' : 'Edit Details';
            
            let html = '';
            config.fields.forEach(f => {
                const val = item[f] || '';
                if (f === 'pinned') {
                    html += `<div class="form-group"><label style="display:flex; align-items:center; gap:10px;"><input type="checkbox" id="f-${f}" ${val ? 'checked' : ''} style="width:auto; margin:0;"> Pinned to Home Page</label></div>`;
                } else if (f === 'date') {
                    // Use date picker for date fields
                    html += `<div class="form-group"><label>${f}</label><input type="date" id="f-${f}" value="${val}"></div>`;
                } else if (f === 'image') {
                    // Use file picker for images
                    html += `
                        <div class="form-group">
                            <label>${f}</label>
                            <div style="display:flex; gap:10px;">
                                <input type="text" id="f-${f}" value="${val}" placeholder="/images/example.png" style="flex:1">
                                <button class="btn btn-outline" onclick="pickImage('${f}')">Browse</button>
                            </div>
                            <p style="font-size:11px; color:var(--text-muted); margin-top:5px;">Pick an image to auto-fill the path. Make sure to move the file to /images/.</p>
                        </div>
                    `;
                } else if (f === 'description') {
                    html += `<div class="form-group"><label>${f}</label><textarea id="f-${f}" rows="4">${val}</textarea></div>`;
                } else {
                    html += `<div class="form-group"><label>${f}</label><input type="text" id="f-${f}" value="${val}"></div>`;
                }
            });
            document.getElementById('dialog-form').innerHTML = html;
            document.getElementById('dialog-overlay').style.display = 'flex';
        }

        async function pickImage(fieldId) {
            try {
                const [fileHandle] = await window.showOpenFilePicker({
                    types: [{
                        description: 'Images',
                        accept: { 'image/*': ['.png', '.jpg', '.jpeg', '.svg', '.webp'] },
                    }],
                });
                const file = await fileHandle.getFile();
                // We simulate saving to /images/ by auto-filling the path
                // In a real environment, you'd need a backend to actually move the file.
                document.getElementById(`f-${fieldId}`).value = '/images/' + file.name;
                showStatus(`Selected ${file.name}. Please ensure it exists in your /images/ folder.`);
            } catch (err) {
                console.error(err);
            }
        }

        function closeDialog() { document.getElementById('dialog-overlay').style.display = 'none'; }

        function saveItem() {
            const config = configs[currentSection];
            const item = {};
            config.fields.forEach(f => {
                const input = document.getElementById(`f-${f}`);
                item[f] = f === 'pinned' ? input.checked : input.value;
            });
            if (editingIndex === -1) sectionData.push(item);
            else sectionData[editingIndex] = { ...sectionData[editingIndex], ...item };
            closeDialog();
            renderJSONList();
        }

        function deleteItem(index) { if (confirm('Delete this item?')) { sectionData.splice(index, 1); renderJSONList(); } }

        async function saveMarkdown() { 
            const content = markdownEditor.value();
            await directSave(content, 'about.md', '/about/about.md');
        }
        
        async function saveJSON() { 
            const content = JSON.stringify(sectionData, null, 4);
            const fileName = currentSection + '.json';
            await directSave(content, fileName, '/data/' + fileName);
        }
        
        async function saveBlogMarkdown(name) { 
            const content = markdownEditor.value();
            await directSave(content, name, '/blog/posts/' + name);
        }

        async function directSave(content, suggestedName, defaultPath) {
            try {
                // Check if File System Access API is supported
                if ('showSaveFilePicker' in window) {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: suggestedName,
                        types: [{
                            description: 'Text Files',
                            accept: { 'text/plain': ['.md', '.json'] },
                        }],
                    });
                    const writable = await handle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    showStatus(`Saved successfully to ${handle.name}`);
                } else {
                    // Fallback to download for unsupported browsers
                    download(content, suggestedName);
                }
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error(err);
                    showStatus('Error saving file: ' + err.message, true);
                }
            }
        }

        function download(content, name) {
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            a.click();
            showStatus(`Saved! Please replace the file in your directory with the downloaded '${name}'.`);
        }

        function showStatus(msg, isError = false) {
            const b = document.getElementById('status-banner');
            b.innerText = msg;
            b.style.background = isError ? '#ff4d4d' : 'var(--primary-color)';
            b.style.display = 'block';
            setTimeout(() => b.style.display = 'none', 6000);
        }

        loadSection('about');
    </script>
</body>
</html>
